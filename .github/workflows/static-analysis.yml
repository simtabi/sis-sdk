name: Static analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Lint · Pint · PHPStan · deptrac
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo, intl
          coverage: none

      - name: Cache Composer files
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/composer/files
          key: composer-static-${{ hashFiles('composer.json') }}
          restore-keys: composer-static-

      - name: Install dependencies
        run: composer update --prefer-stable --no-interaction --no-progress

      - name: Parallel lint
        run: composer lint

      - name: Pint (code style)
        run: vendor/bin/pint --test

      - name: PHPStan (level 10 + strict rules)
        run: vendor/bin/phpstan analyse --no-progress --error-format=github

      - name: deptrac (architecture boundary)
        run: vendor/bin/deptrac analyse --config-file=deptrac.yaml --no-progress
